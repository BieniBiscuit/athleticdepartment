<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Impressum der Athletik Dept Webseite">
  <meta name="theme-color" content="#a32b33">
  <title>Impressum | Athletik Dept</title>

  <link rel="stylesheet" href="./global.css">
  <link rel="stylesheet" href="./components/header/header.css">
  <link rel="stylesheet" href="./components/legal/legal.css">
  <link rel="stylesheet" href="./components/footer/footer.css">
  <link rel="shortcut icon" href="./assets/images/favicon.ico" type="image/x-icon">
</head>
<body>
  <a href="#main" class="skip-to-main">Zum Hauptinhalt springen</a>

  <header class="header">
    <div class="header-container">
      <div class="header-logo">
        <a href="./index.html" class="logo-link">
          <img src="./assets/images/logo.jpg" alt="Athletik Dept Logo" class="logo-image">
          <span class="logo-text" data-field="nav.logo">Athletik Dept</span>
        </a>
      </div>
      <button class="header-menu-toggle" id="menuToggle" aria-label="Navigation toggle" aria-expanded="false">
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
      </button>
      <nav class="header-nav" id="headerNav">
        <ul class="nav-list" data-field="nav.items"></ul>
      </nav>
    </div>
  </header>

  <main id="main">
    <div id="legal-container"></div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-section">
        <div class="footer-brand">
          <img src="./assets/images/logo.jpg" alt="Athletik Dept Logo" class="footer-logo-image">
        </div>
        <h3 class="footer-company" data-field="footer.companyName">Athletik Dept</h3>
        <p class="footer-description" data-field="footer.description"></p>
      </div>

      <div class="footer-section">
        <h4>Links</h4>
        <ul class="footer-links" data-field="footer.links.main"></ul>
      </div>

      <div class="footer-section">
        <h4>Legal</h4>
        <ul class="footer-links" data-field="footer.links.legal"></ul>
      </div>

      <div class="footer-section">
        <h4 data-field="footer.contact.social"></h4>
        <p class="footer-contact" data-field="footer.contact.city"></p>
      </div>
    </div>

    <div class="footer-bottom">
      <p class="footer-copyright" data-field="footer.copyright"></p>
    </div>
  </footer>

  <script src="./components/header/header.js"></script>
  <script src="./components/legal/legal.js"></script>
  <script src="./components/footer/footer.js"></script>

  <script>
    const PAGE_KEY = 'impressum';

    Promise.all([
      fetch('./components/legal/legal.html').then(response => response.text()),
      fetch('./data/text.json').then(response => response.json()),
      fetch('./components/legal/text.json').then(response => response.json())
    ])
      .then(([legalHtml, data, legalData]) => {
        document.getElementById('legal-container').innerHTML = legalHtml;

        const currentPage = legalData.legal.pages[PAGE_KEY];
        const mergedData = {
          ...data,
          legal: {
            ...legalData.legal,
            current: currentPage
          }
        };

        if (window.initLegalPage) {
          window.initLegalPage(mergedData, PAGE_KEY);
        }

        const titleElement = document.querySelector('.legal-title');
        if (titleElement) {
          document.title = `${titleElement.textContent} | Athletik Dept`;
        }

        loadDataFields(mergedData);
        if (window.initHeader) window.initHeader(mergedData);
        if (window.initFooter) window.initFooter(mergedData);
      })
      .catch(error => console.error('Fehler beim Laden der Impressum-Seite:', error));

    function loadDataFields(data) {
      const elements = document.querySelectorAll('[data-field]');
      elements.forEach(element => {
        const fieldPath = element.getAttribute('data-field');
        const value = getNestedValue(data, fieldPath);
        if (value !== undefined) {
          element.textContent = value;
        }
      });
    }

    function getNestedValue(obj, path) {
      return path.split('.').reduce((current, prop) => current?.[prop], obj);
    }
  </script>
</body>
</html>
